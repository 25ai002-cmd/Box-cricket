<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Shield Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <!-- Red Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>
  <!-- Shield Base -->
  <path d="M256 40 C 370 40, 440 80, 440 220 C 440 340, 320 440, 256 472 C 192 440, 72 340, 72 220 C 72 80, 142 40, 256 40 Z" fill="url(#bgGrad)" stroke="url(#primaryGrad)" stroke-width="14" stroke-linejoin="round" />
  <!-- Inner Shield Accent -->
  <path d="M256 65 C 345 65, 405 97, 405 210 C 405 308, 308 392, 256 420 C 204 392, 107 308, 107 210 C 107 97, 167 65, 256 65 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="4" />
  <!-- Dynamic Sports Element (Sleek stylized flaming ball and seam) -->
  <!-- Ball Core -->
  <circle cx="256" cy="240" r="80" fill="url(#primaryGrad)" />
  <!-- Ball Seam Curved Paths -->
  <path d="M206 178 A 80 80 0 0 1 306 302" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="10 6" opacity="0.9" />
  <path d="M306 178 A 80 80 0 0 0 206 302" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="10 6" opacity="0.9" />
  <!-- Dynamic swooshes/wings for speed -->
  <path d="M120 220 C 170 200, 210 215, 230 225 C 200 235, 170 235, 130 250 Z" fill="#EF4444" opacity="0.8" />
  <path d="M392 220 C 342 200, 302 215, 282 225 C 312 235, 342 235, 382 250 Z" fill="#EF4444" opacity="0.8" />
  <path d="M140 170 C 180 160, 215 175, 230 185 C 200 192, 180 192, 150 205 Z" fill="#F87171" opacity="0.9" />
  <path d="M372 170 C 332 160, 297 175, 282 185 C 312 192, 332 192, 362 205 Z" fill="#F87171" opacity="0.9" />
  <!-- Star on top of the ball -->
  <polygon points="256,110 261,125 277,125 264,134 269,150 256,140 243,150 248,134 235,125 251,125" fill="url(#goldGrad)" />
</svg>